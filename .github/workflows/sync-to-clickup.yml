name: Sync ClickUp Docs

on:
  push:
    branches: [main]
    paths:
      - 'clickup-docs/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync markdown files to ClickUp
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_WORKSPACE_ID: ${{ secrets.CLICKUP_WORKSPACE_ID }}
          CLICKUP_SYNC_CONFIG: ${{ secrets.CLICKUP_SYNC_CONFIG }}
        run: |
          set -e
          FAILED=0

          for file in clickup-docs/*.md; do
            PAGE_ID=$(echo "$CLICKUP_SYNC_CONFIG" | jq -r --arg f "$file" '.[$f].pageId')
            DOC_ID=$(echo "$CLICKUP_SYNC_CONFIG" | jq -r --arg f "$file" '.[$f].docId')
            NAME=$(echo "$CLICKUP_SYNC_CONFIG" | jq -r --arg f "$file" '.[$f].name')

            if [ "$PAGE_ID" = "null" ]; then
              echo "No mapping for $file — skipping"
              continue
            fi

            echo "Syncing: $file → '$NAME'"

            RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              "https://api.clickup.com/api/v3/workspaces/$CLICKUP_WORKSPACE_ID/docs/$DOC_ID/pages/$PAGE_ID" \
              -H "Authorization: $CLICKUP_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg content "$(cat "$file")" '{content: $content, content_format: "text/md"}')")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✓ Synced $file (HTTP $HTTP_CODE)"
            else
              echo "✗ Failed: $file (HTTP $HTTP_CODE) — $BODY"
              FAILED=1
            fi
          done

          exit $FAILED
